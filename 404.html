<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>
<script>
// 靜態網站(GitHub Pages)沒有後端路由。深層連結 …/dictionary/<word> 會落到這支 404,
// 這裡把它轉回字典頁並帶上 ?w=<word>,由前端查詢並改回漂亮網址。其餘 404 顯示一般訊息。
(function () {
  var marker = '/dictionary/', p = location.pathname, i = p.indexOf(marker);
  if (i >= 0) {
    var word = decodeURIComponent(p.slice(i + marker.length).replace(/\/+$/, ''));
    location.replace(p.slice(0, i + marker.length) + (word ? ('?w=' + encodeURIComponent(word)) : ''));
  }
})();
</script>
<style>body{font-family:system-ui,"Segoe UI","Microsoft JhengHei",sans-serif;max-width:600px;margin:3rem auto;padding:0 1rem;color:#24292f}</style>
</head>
<body>
  <h1>404</h1>
  <p>找不到這個頁面。<a href="/online-toolbox-public/">回工具箱</a></p>
</body>
</html>
