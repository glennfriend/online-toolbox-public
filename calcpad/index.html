<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="numbr 風格的逐行筆記型計算機,內容即時編進網址。">
  <title>Calcpad</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Calcpad <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span class="tip-h">[Feature]</span>
          <span>逐行算式:四則、次方、括號、千分位</span>
          <span>日期/時間加減、時區轉換(含 DST)、日期相減算期間</span>
          <span># 開頭為註解 / 標題行(不計算)</span>
          <span>內容即時編入網址、可複製分享</span>
          <span class="tip-h">[不支援]</span>
          <span>函數(sin/sqrt…)、變數、百分比</span>
          <span>持久儲存(內容只存在網址)</span>
          <span class="tip-h">[技術支援]</span>
          <span>自寫運算式解析器(非 eval)</span>
          <span>Intl.DateTimeFormat(時區)、URL hash</span>
          <span>純前端零依賴</span>
        </span>
      </span></h1>
    <button id="copy-link" class="btn" type="button">🔗 複製網址</button>
  </header>

  <main class="editor">
    <textarea id="input" class="input" wrap="off" spellcheck="false"
      placeholder="逐行輸入,右側即時顯示答案。"></textarea>
    <div id="results" class="results" aria-live="polite"></div>
  </main>

  <p class="actions">
    <button id="ex-math" class="btn" type="button">＝ 算式範例</button>
    <button id="ex-thousands" class="btn" type="button">🔢 千分位範例</button>
    <button id="ex-datetime" class="btn" type="button">🕐 日期範例</button>
    <button id="ex-datediff" class="btn" type="button">📆 日期相減範例</button>
    <button id="ex-comment" class="btn" type="button">💬 註解範例</button>
  </p>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
