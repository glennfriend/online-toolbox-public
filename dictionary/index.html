<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dictionary</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Dictionary</h1>
  </header>

  <div class="layout">
    <div class="left">
      <div class="search-box" data-mode="live">
        <input class="word" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="" disabled>
        <button class="go-btn" type="button">Enter
          <span class="go-tip">
            <span><kbd>Enter</kbd> 查詢這個單字</span>
            <span><kbd>Tab</kbd> 補完最上面的建議</span>
            <span><kbd>↑</kbd> <kbd>↓</kbd> 選擇建議</span>
          </span>
        </button>
        <label class="toggle" title="分頁顯示詞性(避免太長要一直卷動)">
          <span class="toggle-label">分頁</span>
          <input type="checkbox" id="tabs-toggle">
          <span class="slider"></span>
        </label>
        <div class="suggest" hidden></div>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </div>
    <div class="right">
      <div id="entry" class="entry"></div>
    </div>
  </div>

  <footer class="foot">
    <span id="version" class="version"></span>
    <button id="rebuild" type="button" class="rebuild" title="清除本機快取、重新下載最新字典">重建本機資料</button>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
