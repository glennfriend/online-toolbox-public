<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dictionary</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <div class="left">
      <div id="entry" class="entry"></div>
    </div>
    <div class="right">
      <div class="title-row">
        <h1 class="title">Dictionary
          <span class="tipinfo"><span class="tipinfo-btn" tabindex="0" aria-label="說明">💡</span>
            <span class="tipinfo-tip">
              <span class="tip-h">[Feature]</span>
              <span>即時前綴自動完成(依詞頻)、鍵盤導航</span>
              <span>詞性分組:定義/例句/IPA/繁中註解/常用度</span>
              <span>發音(真人錄音優先,否則語音合成)</span>
              <span class="tip-h">[不支援]</span>
              <span>定義/同義字搜尋、拼字糾正(僅前綴補完)</span>
              <span>雙向查詢(中文僅為釋義)</span>
              <span class="tip-h">[技術支援]</span>
              <span>OPFS + SQLite WASM(10 萬+ 單字存本機)</span>
              <span>Web Worker、DecompressionStream</span>
              <span>發音 API(dictionaryapi.dev)、Web Speech API</span>
            </span>
          </span></h1>
        <div class="info">
          <button id="info-btn" class="info-btn" type="button" aria-label="資料版本與重建" title="資料版本 / 重建本機資料">ⓘ</button>
          <div id="info-pop" class="info-pop" hidden>
            <div id="version" class="version"></div>
            <button id="rebuild" type="button" class="rebuild" title="清除本機快取、重新下載最新字典">重建本機資料</button>
          </div>
        </div>
      </div>
      <div class="search-box" data-mode="live">
        <input class="word" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="" disabled>
        <button class="go-btn" type="button">Enter
          <span class="go-tip">
            <span><kbd>Enter</kbd> 查詢這個單字</span>
            <span><kbd>Tab</kbd> 補完最上面的建議</span>
            <span><kbd>↑</kbd> <kbd>↓</kbd> 選擇建議</span>
          </span>
        </button>
        <label class="toggle" title="分頁顯示詞性(避免太長要一直卷動)">
          <span class="toggle-label">分頁</span>
          <input type="checkbox" id="tabs-toggle">
          <span class="slider"></span>
        </label>
        <div class="suggest" hidden></div>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
