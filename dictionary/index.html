<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Dictionary</h1>
  </header>

  <div class="boxes">
    <div class="search-col">
      <div class="col-label">原本(按 Enter 查詢)</div>
      <div class="search-box" data-mode="commit">
        <input class="word" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="輸入英文單字…" disabled>
        <button class="go-btn" type="button">Enter
          <span class="go-tip">
            <span><kbd>Enter</kbd> 查詢這個單字</span>
            <span><kbd>Tab</kbd> 補完最上面的建議</span>
            <span><kbd>↑</kbd> <kbd>↓</kbd> 選擇建議</span>
          </span>
        </button>
        <div class="suggest" hidden></div>
      </div>
    </div>
    <div class="search-col">
      <div class="col-label">即時(所輸入即所得,免按 Enter)</div>
      <div class="search-box" data-mode="live">
        <input class="word" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="輸入英文單字…" disabled>
        <div class="suggest" hidden></div>
      </div>
    </div>
  </div>

  <div id="status" class="status" aria-live="polite"></div>
  <div id="entry" class="entry"></div>

  <footer class="foot">
    <span id="version" class="version"></span>
    <button id="rebuild" type="button" class="rebuild" title="清除本機快取、重新下載最新字典">重建本機資料</button>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
