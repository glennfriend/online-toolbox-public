<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Dictionary</h1>
  </header>

  <div class="search-box">
    <input id="word" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="輸入英文單字…" disabled>
    <button id="go" class="go-btn" type="button">Enter
      <span class="go-tip">
        <span><kbd>Enter</kbd> 查詢這個單字</span>
        <span><kbd>Tab</kbd> 補完最上面的建議</span>
        <span><kbd>↑</kbd> <kbd>↓</kbd> 選擇建議</span>
      </span>
    </button>
    <div id="suggest" class="suggest" hidden></div>
  </div>

  <div id="status" class="status" aria-live="polite"></div>
  <div id="entry" class="entry"></div>

  <footer class="foot">
    <span id="version" class="version"></span>
    <button id="rebuild" type="button" class="rebuild" title="清除本機快取、重新下載最新字典">重建本機資料</button>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
