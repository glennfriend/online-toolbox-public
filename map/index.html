<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Map</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🗺️%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Map
      <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span>把地點分「組」記錄;每個點有 emoji、標題、內容</span>
          <span>點清單裡的地點 → 右邊地圖跳過去(免 API key)</span>
          <span>搜尋地名、或貼 Google Maps 連結 / 經緯度都可以</span>
          <span>每組可匯出 / 匯入(JSON 或 CSV),純前端、存在本機</span>
        </span>
      </span>
    </h1>
  </header>

  <div class="bar">
    <span class="bar-label">組</span>
    <select id="groups" class="select"></select>
    <button id="newGroup" class="btn" type="button">＋ 新組</button>
    <button id="renameGroup" class="btn" type="button">改名</button>
    <button id="delGroup" class="btn" type="button">刪除組</button>
    <span class="spacer"></span>
    <button id="exportJson" class="btn" type="button">匯出 JSON</button>
    <button id="exportCsv" class="btn" type="button">匯出 CSV</button>
    <button id="importBtn" class="btn" type="button">匯入</button>
    <input id="importFile" type="file" accept=".json,.csv" hidden>
  </div>

  <section class="layout">
    <aside class="panel">
      <div class="add">
        <div class="add-row">
          <input id="q" class="q" type="text" placeholder="搜尋地點 / 貼 Google Maps 連結 / 或 lat,lng">
          <button id="search" class="btn primary" type="button">搜尋</button>
        </div>
        <div id="results" class="results" hidden></div>
        <div id="picked" class="picked" hidden>
          <div id="pickedLoc" class="picked-loc"></div>
          <div class="fields">
            <input id="emoji" class="emoji" maxlength="4" value="📍" title="圖示(emoji)">
            <input id="title" class="title" type="text" placeholder="標題">
          </div>
          <textarea id="note" class="note" placeholder="內容 / 備註(可留空)"></textarea>
          <button id="addPoint" class="btn primary wide" type="button">＋ 加入此組</button>
        </div>
      </div>
      <div id="list" class="list"></div>
    </aside>

    <div class="mapwrap">
      <iframe id="map" class="map" title="地圖" src="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
