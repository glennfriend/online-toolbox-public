<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Map</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🗺️%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bar">
    <span class="brand">Map
      <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span>🔒 內建組來自版控資料、唯讀;你自己的組可新增/匯入/刪除</span>
          <span>點清單裡的地點 → 看詳情 + 地圖跳過去(免 API key)</span>
          <span>找店家:在 Google Maps 找到 → 複製「網址列」連結貼上(短網址 maps.app.goo.gl 無座標、不適用)</span>
          <span>每組可匯出 / 匯入 JSON,純前端、你的組存在本機</span>
        </span>
      </span>
    </span>
    <span class="bar-label">組</span>
    <select id="groups" class="select"></select>
    <span class="spacer"></span>
    <button id="newGroup" class="btn" type="button">＋ 新組</button>
    <button id="renameGroup" class="btn" type="button">改名</button>
    <button id="delGroup" class="btn" type="button">刪除組</button>
    <span class="bar-label">第二行</span>
    <select id="line2" class="select select-sm">
      <option value="address">地址</option>
      <option value="hours">營業時間</option>
      <option value="tags">tags</option>
      <option value="rating">評分</option>
      <option value="note">備註</option>
    </select>
    <button id="exportJson" class="btn export-gap" type="button">匯出 JSON</button>
    <button id="importBtn" class="btn" type="button">匯入 JSON</button>
    <input id="importFile" type="file" accept=".json,application/json" hidden>
  </div>

  <section class="layout">
    <aside class="panel">
      <div id="adder" class="add">
        <div class="add-row">
          <input id="q" class="q" type="text" placeholder="貼 Google Maps 連結(找店家最準)/ 搜地址地標 / lat,lng">
          <button id="search" class="btn primary" type="button">搜尋</button>
        </div>
        <div id="results" class="results" hidden></div>
        <div id="picked" class="picked" hidden>
          <div id="pickedLoc" class="picked-loc"></div>
          <div class="fields">
            <input id="emoji" class="emoji" maxlength="4" value="📍" title="圖示(emoji)">
            <input id="title" class="title" type="text" placeholder="標題">
          </div>
          <input id="address" class="fld" type="text" placeholder="地址(可留空)">
          <div class="fields">
            <input id="hours" class="fld" type="text" placeholder="營業時間(可留空)">
            <input id="rating" class="rating-in" type="number" step="0.1" min="0" max="5" placeholder="評分">
          </div>
          <input id="tags" class="fld" type="text" placeholder="tags:逗號分隔,如 拉麵, 日式">
          <textarea id="note" class="note" placeholder="內容 / 備註(可留空)"></textarea>
          <button id="addPoint" class="btn primary wide" type="button">＋ 加入此組</button>
        </div>
      </div>

      <div id="detail" class="detail" hidden></div>
      <div id="list" class="list"></div>
    </aside>

    <div class="mapwrap" id="mapwrap"></div>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
