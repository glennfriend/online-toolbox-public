<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>OCR</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔠%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bar">
    <span class="brand">OCR
      <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span class="tip-h">[Feature]</span>
          <span>拖 / 貼 / 上傳圖片 → 抽出可複製文字</span>
          <span>繁中 + 簡中 + 英文(單一模型、可混排)</span>
          <span>純前端、圖片不上傳;模型快取於瀏覽器</span>
          <span class="tip-h">[不支援]</span>
          <span>手寫、嚴重模糊 / 藝術字、複雜版面不保證</span>
          <span>首次需下載模型(數十 MB,之後快取)</span>
          <span class="tip-h">[技術支援]</span>
          <span>PaddleOCR PP-OCRv6(ppu-paddle-ocr)+ onnxruntime-web(WebGPU/WASM)</span>
          <span>純前端、無後端、無 API key</span>
        </span>
      </span>
    </span>
    <span class="spacer"></span>
    <span id="status" class="status"></span>
  </div>

  <section class="layout">
    <div class="left">
      <div id="drop" class="drop">
        <div class="drop-hint">
          <div class="drop-big">拖曳圖片或 PDF 到這裡,或直接貼上(Ctrl / ⌘ + V)</div>
          <div class="drop-sub">要從檔案選,請按下方「選擇檔案」</div>
        </div>
        <img id="preview" class="preview" alt="預覽" hidden>
      </div>
      <input id="file" type="file" accept="image/*,application/pdf" hidden>
      <div class="actions">
        <button id="pick" class="btn" type="button">選擇檔案</button>
        <select id="pages" class="sel" title="PDF 解析頁數範圍" hidden>
          <option value="1-3">解析第 1–3 頁</option>
          <option value="1-10">解析第 1–10 頁</option>
          <option value="11-20">解析第 11–20 頁</option>
          <option value="all">解析整個 PDF</option>
        </select>
        <button id="run" class="btn primary" type="button" disabled>辨識文字</button>
        <button id="clear" class="btn" type="button">清空</button>
        <label class="opt">
          <input id="prep" type="checkbox"> 影像前處理
          <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
            <span class="info-tip">
              <span class="tip-h">[影像前處理]</span>
              <span>轉灰階、自動拉對比、放大小圖</span>
              <span>對小字 / 低對比 / 偏暗的截圖較有幫助</span>
              <span>清晰文件可能不需要,故預設關閉</span>
            </span>
          </span>
        </label>
      </div>
    </div>

    <div class="right">
      <div class="result-head">
        <button id="copy" class="btn" type="button" disabled>📋 複製</button>
      </div>
      <textarea id="result" class="result" spellcheck="false" placeholder="辨識出的文字會出現在這裡,可直接編輯與複製…"></textarea>
    </div>
  </section>

  <!-- import map:把 onnxruntime-web 指到「瀏覽器專用 bundle」(關鍵:避開 node 相容墊片 process.binding 的錯) -->
  <script type="importmap">
  {
    "imports": {
      "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.26.0/dist/ort.all.bundle.min.mjs",
      "ppu-ocv/web": "https://cdn.jsdelivr.net/npm/ppu-ocv@3.3.0/index.web.js",
      "ppu-ocv/canvas-web": "https://cdn.jsdelivr.net/npm/ppu-ocv@3.3.0/index.canvas-web.js",
      "pdfjs-dist": "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.min.mjs"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
