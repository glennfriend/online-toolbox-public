<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="貼上資料,依 tags 推薦的轉換步驟串成管線,一步步得到想要的結果。">
  <title>Pipeflow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Pipeflow<span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span class="tip-h">[Feature]</span>
          <span>貼資料自動辨識、串接轉換管線(連動重算)</span>
          <span>表格互轉、排序、統計、URL 萃取、分組加總</span>
          <span>進階:SQL 查詢、Mermaid 圖、翻譯</span>
          <span class="tip-h">[不支援]</span>
          <span>分支管線(僅單線)、CSV 引號內逗號</span>
          <span>進階功能需網路(離線時其餘仍可用)</span>
          <span class="tip-h">[技術支援]</span>
          <span>核心純前端零依賴</span>
          <span>選用 CDN:DuckDB-Wasm(SQL)、Mermaid(圖)、翻譯端點</span>
          <span>Web Worker、DOMParser</span>
        </span>
      </span></h1>
    <div id="examples" class="examples"></div>
  </header>

  <div id="flow" class="flow"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
