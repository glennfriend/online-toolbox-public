<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="貼上即時 render 的剪貼簿工具。">
  <title>Scrapbook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="workspace">
    <section class="pane">
      <div class="pane-head">
        <span class="pane-title">輸入</span>
        <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
          <span class="info-tip">
            <span class="tip-h">[Feature]</span>
            <span>貼上即自動辨識(JSON/Markdown/CSV/Diff/HTML/程式碼)並美化</span>
            <span>文字與圖片存本機、可隨時取回(顯示用量)</span>
            <span>富文字複製(保留排版)、貼圖</span>
            <span>未存內容自動進「暫存」防遺失</span>
            <span class="tip-h">[不支援]</span>
            <span>跨裝置同步、雲端備份</span>
            <span>型別偵測為啟發式(少數會猜錯)</span>
            <span class="tip-h">[技術支援]</span>
            <span>IndexedDB</span>
            <span>Clipboard API、Canvas(轉 PNG)</span>
            <span>純前端零依賴</span>
          </span>
        </span>
        <div class="pane-actions">
          <button id="save" class="btn" type="button">Scrapbook 儲存</button>
        </div>
      </div>
      <textarea id="input" class="input"
        placeholder="在這裡貼上 Markdown、HTML、JSON / 物件、程式碼…"
        spellcheck="false"></textarea>

      <!-- 儲存庫放在左欄輸入框下面:右欄(顯示)內容再長也不會把它擠到最底、按不到 -->
      <section class="saved-section">
        <h2>儲存庫 <span id="storage-status" class="storage-status"></span></h2>
        <div id="saved" class="saved"></div>
      </section>
    </section>

    <section class="pane">
      <div class="pane-head">
        <span class="pane-title">顯示</span>
        <span id="badge" class="badge"></span>
        <div class="pane-actions">
          <button id="copy" class="btn btn-ghost" type="button">📋 複製</button>
        </div>
      </div>
      <div id="display" class="display"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
