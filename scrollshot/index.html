<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="輸入網址,產生整頁(含卷動)截圖,可下載 / 複製。">
  <title>Scrollshot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>Scrollshot <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span class="tip-h">[Feature]</span>
          <span>輸入網址截整頁或可見區</span>
          <span>三家免費服務自動容錯切換、記住上次成功</span>
          <span>下載 / 複製到剪貼簿</span>
          <span class="tip-h">[不支援]</span>
          <span>離線(需網路)、網頁 JS 動態內容</span>
          <span>自訂延遲、金鑰管理(靠免費配額)</span>
          <span class="tip-h">[技術支援]</span>
          <span>外部截圖 API:Microlink / thum.io / mShots</span>
          <span>localStorage、Clipboard API、Canvas</span>
          <span>無第三方函式庫</span>
        </span>
      </span></h1>
  </header>

  <form id="form" class="bar">
    <input id="url" class="url" type="text" inputmode="url" autocomplete="off"
      placeholder="https://example.com">
    <button id="go" class="btn btn-primary" type="submit">截圖</button>
  </form>

  <div class="options">
    <label><input type="checkbox" id="fullpage" checked> 整頁(含卷動)</label>
    <span class="svc">服務順序自動切換: <span id="svcorder"></span></span>
  </div>

  <div id="steps" class="steps" aria-live="polite"></div>

  <div id="actions" class="actions" hidden>
    <button id="download" class="btn" type="button">⬇ 下載</button>
    <button id="copy" class="btn" type="button">📋 複製</button>
    <a id="openorig" class="btn" target="_blank" rel="noopener">↗ 原圖</a>
  </div>

  <div id="result" class="result"></div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
