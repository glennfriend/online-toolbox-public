<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TextDiff</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔬%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="head">
    <h1>TextDiff
      <span class="info"><span class="info-btn" tabindex="0" aria-label="說明">💡</span>
        <span class="info-tip">
          <span>連「看不見的字元」(空白 / Tab / 零寬 / NBSP / 全形空格)都抓出來</span>
          <span>Unicode 同形字(肉眼相同、其實不同的字)</span>
          <span>NFC / NFD 正規化差異</span>
          <span>行尾(CRLF / LF / CR)與 BOM</span>
          <span>純前端、不上傳</span>
        </span>
      </span>
    </h1>
  </header>

  <div class="modebar"><span class="bar-label">模式</span><div class="modes" id="modes"></div></div>

  <section class="inputs">
    <div class="ta-wrap"><textarea id="a" class="ta" spellcheck="false" placeholder="貼上文字 A…"></textarea><span class="ta-mark">Origin</span></div>
    <div class="ta-wrap"><textarea id="b" class="ta" spellcheck="false" placeholder="貼上文字 B…"></textarea><span class="ta-mark">Changed</span></div>
  </section>

  <div class="toolbar">
    <div id="options" class="opts"></div>
    <button id="swap" class="btn" type="button">⇄ 對調</button>
    <button id="clear" class="btn" type="button">清空</button>
    <span id="summary" class="summary"></span>
  </div>

  <div id="report" class="report"></div>
  <div id="banner" class="banner" hidden></div>
  <div id="diff" class="diff"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
